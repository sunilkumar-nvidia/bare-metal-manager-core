instances:
  - url: nvidia-ncx-infra-controller.docs.buildwithfern.com/infra-controller
    custom-domain: docs.nvidia.com/infra-controller

title: NVIDIA NCX Infra Controller

metadata:
  canonical-host: "docs.nvidia.com/infra-controller"

ai-search:
  location:
    - docs

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: "#76B900"
    light: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"

theme:
  page-actions: toolbar
  footer-nav: minimal

typography:
  bodyFont:
    name: NVIDIA
    paths:
      - path: assets/fonts/NVIDIASans.woff2
        style: normal
      - path: assets/fonts/NVIDIASans_Italic.woff2
        style: italic
  codeFont:
    name: RobotoMono
    paths:
      - path: assets/fonts/RobotoMono.woff2

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /

favicon: ./assets/NVIDIA_symbol.svg

js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive

css:
  - ./main.css

navbar-links:
  - type: filled
    text: GitHub
    href: https://github.com/NVIDIA/ncx-infra-controller-core

products:
  - display-name: NCX Infra Controller
    slug: /
    path: ../docs/index.yml
    versions:
      - display-name: dev
        path: ../docs/index.yml

redirects:
  - source: "/infra-controller/index.html"
    destination: "/infra-controller/"
  - source: "/infra-controller/dev/index.html"
    destination: "/infra-controller/dev/"

experimental:
  mdx-components:
    - ./components
  basepath-aware: true
