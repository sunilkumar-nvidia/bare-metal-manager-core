## =============================================================================
## forge-roots — sync site-root CA cert to all carbide-managed namespaces.
## Source: site-root Secret in cert-manager namespace.
## Target: forge-roots Secret in every namespace labeled
##         carbide.nvidia.com/managed=true
## creationPolicy: Orphan — ESO syncs value but does not set ownerReference,
##   so GC never cascades a delete to forge-roots if the ExternalSecret churns.
## =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: forge-roots-eso
spec:
  namespaceSelector:
    matchLabels:
      carbide.nvidia.com/managed: "true"
  refreshTime: 30s
  externalSecretSpec:
    secretStoreRef:
      name: cert-manager-ns-secretstore
      kind: ClusterSecretStore
    target:
      name: forge-roots
      creationPolicy: Orphan
      template:
        type: Opaque
        data:
          ca.crt: "{{`{{ .site_ca }}`}}"
    data:
      - secretKey: site_ca
        remoteRef:
          key: site-root
          property: ca.crt

## =============================================================================
## carbide-db-eso — sync operator-generated DB credentials → forge-system.
## Source: forge-system.carbide.forge-pg-cluster.credentials.postgresql.acid.zalan.do
##         in postgres namespace (created automatically by Zalando operator).
## Target: forge-system.carbide.forge-pg-cluster.credentials in forge-system
##         (same name carbide-api reads — application side unchanged).
## =============================================================================
{{- if .Values.postgresql.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: carbide-db-eso
spec:
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values: ["{{ .Values.namespace }}"]
  refreshTime: 30s
  externalSecretSpec:
    secretStoreRef:
      name: postgres-ns-secretstore
      kind: ClusterSecretStore
    target:
      name: forge-system.carbide.forge-pg-cluster.credentials
      deletionPolicy: Retain
    dataFrom:
      - extract:
          key: forge-system.carbide.forge-pg-cluster.credentials.postgresql.acid.zalan.do
          version: v1
{{- end }}
