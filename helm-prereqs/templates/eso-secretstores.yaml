## =============================================================================
## ESO ClusterSecretStore: cert-manager namespace
## Reads site-root CA Secret → synced to forge-roots in managed namespaces.
## =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: cert-manager-ns-secretstore
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Values.certManagerNamespace }}
      server:
        {{- if .Values.clusterApiServer }}
        url: {{ .Values.clusterApiServer | quote }}
        {{- end }}
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: {{ .Values.certManagerNamespace }}
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-cert-manager-ns
          namespace: {{ .Values.certManagerNamespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-cert-manager-ns
  namespace: {{ .Values.certManagerNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-secret-reader
  namespace: {{ .Values.certManagerNamespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secret-reader
  namespace: {{ .Values.certManagerNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-secret-reader
subjects:
  - kind: ServiceAccount
    name: eso-cert-manager-ns
    namespace: {{ .Values.certManagerNamespace }}

## =============================================================================
## ESO ClusterSecretStore: postgres namespace
## Reads operator-generated DB credential Secrets → distributed to app namespaces.
## =============================================================================
{{- if .Values.postgresql.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: postgres-ns-secretstore
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Values.postgresNamespace }}
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: {{ .Values.postgresNamespace }}
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-postgres-ns
          namespace: {{ .Values.postgresNamespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-postgres-ns
  namespace: {{ .Values.postgresNamespace }}
---
## Long-lived token so ESO can authenticate without token rotation timing issues
apiVersion: v1
kind: Secret
metadata:
  name: eso-postgres-ns-token
  namespace: {{ .Values.postgresNamespace }}
  annotations:
    kubernetes.io/service-account.name: eso-postgres-ns
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eso-postgres-ns-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-postgres-ns-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eso-postgres-ns-role
subjects:
  - kind: ServiceAccount
    name: eso-postgres-ns
    namespace: {{ .Values.postgresNamespace }}
{{- end }}
