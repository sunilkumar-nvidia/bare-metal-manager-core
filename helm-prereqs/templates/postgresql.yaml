{{- if .Values.postgresql.enabled }}
## =============================================================================
## forge-pg-cluster-env — injected into every postgres pod as env vars.
## Created here (carbide-prereqs chart) so Values.siteName flows in at install.
## Namespace: postgres (operator namespace, not forge-system).
## =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-pg-cluster-env
  namespace: {{ .Values.postgresNamespace }}
data:
  TMP_SITE: {{ .Values.siteName | quote }}

## =============================================================================
## forge-pg-cluster — 3-node HA PostgreSQL managed by Zalando postgres-operator.
##
## Operator (acid.zalan.do) runs in the postgres namespace and creates the
## StatefulSet, Services, and per-user credential Secrets there.
##
## DB credentials are generated by the operator and distributed to forge-system
## via ESO (ClusterExternalSecret carbide-db-eso in eso-external-secrets.yaml).
## =============================================================================
---
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: forge-pg-cluster
  namespace: {{ .Values.postgresNamespace }}
spec:
  teamId: forge
  volume:
    size: {{ .Values.postgresql.volumeSize }}
    storageClass: local-path-persistent
  numberOfInstances: {{ .Values.postgresql.instances }}
  resources:
    limits:
      cpu: {{ .Values.postgresql.resources.limits.cpu | quote }}
      memory: {{ .Values.postgresql.resources.limits.memory | quote }}
    requests:
      cpu: {{ .Values.postgresql.resources.requests.cpu | quote }}
      memory: {{ .Values.postgresql.resources.requests.memory | quote }}
  users:
    forge-system.carbide:
      - superuser
      - createdb
  databases:
    forge_system_carbide: forge-system.carbide
  patroni:
    synchronous_mode: true
    synchronous_mode_strict: true
    synchronous_node_count: 1
  postgresql:
    version: "15"
    parameters:
      max_connections: "1024"
      synchronous_commit: "remote_apply"
      lock_timeout: "2min"
      statement_timeout: "10min"
      idle_in_transaction_session_timeout: "15min"
      idle_session_timeout: "60min"
  sidecars:
    - name: postgres-exporter
      image: "quay.io/prometheuscommunity/postgres-exporter:latest"
      ports:
        - containerPort: 9187
          protocol: TCP
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 200Mi
      env:
        - name: DATA_SOURCE_URI
          value: "forge-pg-cluster.{{ .Values.postgresNamespace }}.svc.cluster.local/postgres?sslmode=require"
        - name: DATA_SOURCE_USER
          valueFrom:
            secretKeyRef:
              name: postgres.forge-pg-cluster.credentials.postgresql.acid.zalan.do
              key: username
        - name: DATA_SOURCE_PASS
          valueFrom:
            secretKeyRef:
              name: postgres.forge-pg-cluster.credentials.postgresql.acid.zalan.do
              key: password
        - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
          value: "true"
{{- end }}
