## =============================================================================
## Prereqs secrets: Vault token, AppRole, SSH host key
## ESO handles: forge-roots (CA) via forge-roots-eso ClusterExternalSecret
## ESO handles: DB credentials via carbide-db-eso ClusterExternalSecret
## Vault handles: PKI certs (via vault-forge-issuer ClusterIssuer)
## =============================================================================
{{- $sshPrivKey := include "prereqs.sshPrivateKey" . }}
---
## carbide-vault-approle-tokens: placeholder — vault-config-job (post-install hook)
## patches this secret with real role-id and secret-id fetched from Vault after
## AppRole auth is configured. The placeholder values here are overwritten before
## any carbide-api or carbide-bmc-proxy pod reads them.
apiVersion: v1
kind: Secret
metadata:
  name: carbide-vault-approle-tokens
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  VAULT_ROLE_ID: ""
  VAULT_SECRET_ID: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: carbide-vault-token
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  token: {{ .Values.vault.token | quote }}
---
## azure-sso-carbide-web-client-secret: Azure SSO client secret for carbide-web.
## Set azureSSOClientSecret in values or patch this secret before starting carbide-web
## if Azure SSO is enabled at your site. Leave empty if not using Azure SSO.
apiVersion: v1
kind: Secret
metadata:
  name: azure-sso-carbide-web-client-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  client_secret: {{ .Values.azureSSOClientSecret | default "" | quote }}
---
## SSH host key for carbide-ssh-console-rs
## Generated inline by Helm — no Job, no network dependency.
## Private key: PKCS8 PEM (ed25519). Server derives public key at startup from private key.
## Idempotent: reuses existing secret on helm upgrade (lookup in _helpers.tpl).
apiVersion: v1
kind: Secret
metadata:
  name: ssh-host-key
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  ssh_host_ed25519_key: |
{{ $sshPrivKey | indent 4 }}
  ssh_host_ed25519_key_pub: ""
