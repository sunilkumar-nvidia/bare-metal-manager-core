## =============================================================================
## ServiceAccount + token Secret for cert-manager → Vault authentication
## Used by the vault-forge-issuer ClusterIssuer to authenticate to Vault.
## Lives in certManagerNamespace (where cert-manager is installed).
## =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-manager-vault-forgeca-issuer
  namespace: {{ .Values.certManagerNamespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-forgeca-issuer-token
  namespace: {{ .Values.certManagerNamespace }}
  annotations:
    kubernetes.io/service-account.name: cert-manager-vault-forgeca-issuer
type: kubernetes.io/service-account-token
