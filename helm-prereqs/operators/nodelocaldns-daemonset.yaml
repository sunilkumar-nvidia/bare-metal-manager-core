# NodeLocal DNSCache DaemonSet — Kubespray clusters ONLY
#
# This manifest is applied by setup.sh only when the Kubespray-created
# ConfigMap "nodelocaldns" exists in kube-system. It references a ServiceAccount
# and ConfigMap that Kubespray creates as part of cluster provisioning.
#
# DO NOT apply this on kubeadm or other non-Kubespray clusters — the
# required ConfigMap and ServiceAccount will be missing and the pods will fail.
# Those clusters use CoreDNS directly and do not need NodeLocal DNSCache.
#
# Apply once per Kubespray cluster: kubectl apply -f operators/nodelocaldns-daemonset.yaml
# Verify:                           kubectl get pods -n kube-system -l k8s-app=nodelocaldns
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nodelocaldns
  namespace: kube-system
  labels:
    k8s-app: nodelocaldns
    addonmanager.kubernetes.io/mode: Reconcile
spec:
  selector:
    matchLabels:
      k8s-app: nodelocaldns
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 10%
  template:
    metadata:
      labels:
        k8s-app: nodelocaldns
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9253"
    spec:
      priorityClassName: system-node-critical
      serviceAccountName: nodelocaldns
      hostNetwork: true
      dnsPolicy: Default  # must be Default — avoids the pod using itself for DNS
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      containers:
        - name: node-cache
          image: registry.k8s.io/dns/k8s-dns-node-cache:1.23.1
          resources:
            requests:
              cpu: 25m
              memory: 5Mi
          args:
            - -localip
            - "169.254.25.10"
            - -conf
            - /etc/coredns/Corefile
            - -upstreamsvc
            - "coredns"        # must match the CoreDNS Service name in kube-system
            - -health-port
            - "9254"
          securityContext:
            privileged: true
          ports:
            - containerPort: 53
              name: dns
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 9253
              name: metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              host: 169.254.25.10
              path: /health
              port: 9254
            initialDelaySeconds: 60
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /run/xtables.lock
              name: xtables-lock
              readOnly: false
            - name: config-volume
              mountPath: /etc/coredns
      volumes:
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate
        - name: config-volume
          configMap:
            name: nodelocaldns
            items:
              - key: Corefile
                path: Corefile
