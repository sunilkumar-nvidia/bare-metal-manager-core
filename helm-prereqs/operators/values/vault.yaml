## HashiCorp Vault 0.25.0 — HA Raft + TLS (production)
## Reference: carbide-external/manifests/vault-app/values.yaml
## https://artifacthub.io/packages/helm/hashicorp/vault

global:
  tlsDisable: false

injector:
  enabled: false   # Carbide uses K8s auth directly, not agent injection

csi:
  enabled: false

server:
  ## -------------------------------------------------------------------------
  ## Resources
  ## -------------------------------------------------------------------------
  resources:
    requests:
      cpu: 2000m
      memory: 8Gi
    limits:
      cpu: 2000m
      memory: 16Gi

  ## -------------------------------------------------------------------------
  ## Health probes
  ## standbyok=true  — standby (non-leader) pods pass readiness so they can
  ##                   serve requests and participate in Raft quorum.
  ## sealedcode=204  — sealed pods don't fail liveness (expected at startup).
  ## uninitcode=204  — uninitialized pods don't fail liveness (expected at
  ##                   first boot before vault operator init is run).
  ## -------------------------------------------------------------------------
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"
  livenessProbe:
    enabled: true
    path: "/v1/sys/health?sealedcode=204&uninitcode=204&standbyok=true"
    initialDelaySeconds: 60

  ## -------------------------------------------------------------------------
  ## Persistent storage — both PVCs use local-path-persistent (reclaimPolicy:
  ## Retain) so data survives pod deletion and node drain/scale events.
  ## -------------------------------------------------------------------------
  dataStorage:
    enabled: true
    storageClass: local-path-persistent

  auditStorage:
    enabled: true
    storageClass: local-path-persistent

  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain

  ## -------------------------------------------------------------------------
  ## TLS secrets — generated by cert-manager before Vault starts.
  ##   forgeca-vault-client  — port 8200 listener cert (issued by site-issuer)
  ##   vault-raft-tls        — Raft port 8201 peer cert (issued by site-issuer)
  ## See helm-prereqs/templates/vault-tls-certs.yaml for Certificate resources.
  ## -------------------------------------------------------------------------
  extraEnvironmentVars:
    VAULT_CACERT: /vault/userconfig/forgeca-vault/ca.crt

  volumes:
    - name: forgeca-vault
      secret:
        secretName: forgeca-vault-client
    - name: vault-raft-tls
      secret:
        secretName: vault-raft-tls

  volumeMounts:
    - mountPath: /vault/userconfig/forgeca-vault
      name: forgeca-vault
    - mountPath: /vault/userconfig/vault-raft-tls
      name: vault-raft-tls

  ## -------------------------------------------------------------------------
  ## Certificate reload sidecar
  ## Watches forgeca-vault/ca.crt for changes and sends SIGHUP to the Vault
  ## process to reload TLS certs without a pod restart.
  ## Requires shareProcessNamespace: true.
  ## -------------------------------------------------------------------------
  shareProcessNamespace: true

  extraContainers:
    - name: vault-cert-reload
      image: alpine:3.8
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          last_ca_updated=0
          while true; do
            ca_updated=$(date +'%s' -r /vault/userconfig/forgeca-vault/ca.crt)
            if [ "$ca_updated" -gt "$last_ca_updated" ]; then
              if [ ! -z "$(pidof vault)" ]; then
                kill -s HUP $(pidof vault)
                echo "SIGHUP sent to Vault — reloading TLS certificates."
                last_ca_updated=$ca_updated
              fi
            else
              echo "No updated certificate found, sleeping..."
            fi
            sleep 300
          done
      securityContext:
        capabilities:
          add:
            - SYS_PTRACE
      volumeMounts:
        - name: forgeca-vault
          mountPath: /vault/userconfig/forgeca-vault

  ## -------------------------------------------------------------------------
  ## HA Raft — 3-node cluster
  ## publishNotReadyAddresses: false — only ready pods receive traffic on the
  ## ClusterIP service. Standby pods are still reachable via the headless
  ## service (vault-internal) used by Raft retry_join.
  ## -------------------------------------------------------------------------
  service:
    publishNotReadyAddresses: false

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = false

        listener "tcp" {
          address         = "[::]:8200"
          cluster_address = "[::]:8201"

          tls_cert_file      = "/vault/userconfig/forgeca-vault/tls.crt"
          tls_key_file       = "/vault/userconfig/forgeca-vault/tls.key"
          tls_client_ca_file = "/vault/userconfig/forgeca-vault/ca.crt"

          telemetry {
            unauthenticated_metrics_access = true
          }
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_tls_servername    = "vault-0.vault-internal"
            leader_api_addr          = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file      = "/vault/userconfig/vault-raft-tls/ca.crt"
            leader_client_cert_file  = "/vault/userconfig/vault-raft-tls/tls.crt"
            leader_client_key_file   = "/vault/userconfig/vault-raft-tls/tls.key"
          }
          retry_join {
            leader_tls_servername    = "vault-1.vault-internal"
            leader_api_addr          = "https://vault-1.vault-internal:8200"
            leader_ca_cert_file      = "/vault/userconfig/vault-raft-tls/ca.crt"
            leader_client_cert_file  = "/vault/userconfig/vault-raft-tls/tls.crt"
            leader_client_key_file   = "/vault/userconfig/vault-raft-tls/tls.key"
          }
          retry_join {
            leader_tls_servername    = "vault-2.vault-internal"
            leader_api_addr          = "https://vault-2.vault-internal:8200"
            leader_ca_cert_file      = "/vault/userconfig/vault-raft-tls/ca.crt"
            leader_client_cert_file  = "/vault/userconfig/vault-raft-tls/tls.crt"
            leader_client_key_file   = "/vault/userconfig/vault-raft-tls/tls.key"
          }

          autopilot {
            cleanup_dead_servers          = "true"
            last_contact_threshold        = "200ms"
            last_contact_failure_threshold = "10m"
            max_trailing_logs             = 250000
            min_quorum                    = 3
            server_stabilization_time     = "10s"
          }
        }

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname          = true
        }

        service_registration "kubernetes" {}
