apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "carbide-dpu-agent.fullname" . }}
  labels:
    {{- include "carbide-dpu-agent.labels" . | nindent 4 }}
    {{- with .Values.serviceDaemonSet.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.serviceDaemonSet.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.serviceDaemonSet.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "carbide-dpu-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.serviceDaemonSet.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "carbide-dpu-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.serviceDaemonSet.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      dnsPolicy: ClusterFirst
      {{- if not (empty .Values.serviceDaemonSet.nodeSelector) }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
              {{- toYaml .Values.serviceDaemonSet.nodeSelector | nindent 12 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: forge-dpu-agent-init
          securityContext:
            privileged: true
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          args:
            - init-container
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RUST_BACKTRACE
              value: "full"
            - name: RUST_LIB_BACKTRACE
              value: "0"
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: hw-cache
              mountPath: /data
            - name: sys
              mountPath: /sys
            - name: dev
              mountPath: /dev
            - name: run-udev
              mountPath: /run/udev
            - name: proc-cpu-info
              mountPath: /host-cpu-info
            - name: proc-mem-info
              mountPath: /host-mem-info
            - name: forge-certs
              mountPath: /opt/forge
      containers:
        - name: forge-dpu-agent
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          args:
            - run
            - "nvue-rest"
            - "--agent-platform-type=containerized"
            - "--dhcp-grpc-server=http://carbide-dpf-cluster-{{ .Values.dhcp_server.service_name }}.dpf-operator-system.svc.cluster.local:10079"
            - "--fmds-grpc-server=http://carbide-dpf-cluster-{{ .Values.fmds.service_name }}.dpf-operator-system.svc.cluster.local:50052"
            {{- if not (empty .Values.dhcp_server.interface_prepend) }}
            - "--dhcp-server-interface-prepend={{ .Values.dhcp_server.interface_prepend }}"
            {{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with toYaml .Values.serviceDaemonSet.resources }}
          resources:
            limits:
              {{- . | nindent 14 }}
            requests:
              {{- . | nindent 14 }}
          {{- end }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP  # always resolves to cluster-internal IP
            - name: RUST_BACKTRACE
              value: "full"
            - name: RUST_LIB_BACKTRACE
              value: "0"
            - name: RUST_LOG
              value: "info"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: IGNORE_MGMT_VRF
              value: "1"
            - name: NVUE_HTTPS_ADDRESS
              value: carbide-dpf-cluster-{{ .Values.hbn.nvue_https_address }}.dpf-operator-system.svc.cluster.local:8765
            - name: NVUE_USERNAME
              value: "carbide"
            - name: NVUE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hbn.nvue_credentials_secret_name }}
                  key: {{ .Values.hbn.nvue_password_key }}
          volumeMounts:
            - name: forge-certs
              mountPath: /opt/forge
            - name: hw-cache
              mountPath: /data
              readOnly: true
      volumes:
        - name: forge-certs
          hostPath:
            path: /opt/forge
            type: DirectoryOrCreate
        - name: hw-cache
          emptyDir: {}
        - name: sys
          hostPath:
            path: /sys
        - name: dev
          hostPath:
            path: /dev
        - name: run-udev
          hostPath:
            path: /run/udev
        - name: proc-cpu-info
          hostPath:
            path: /proc/cpuinfo
        - name: proc-mem-info
          hostPath:
            path: /proc/meminfo
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
